services:
  - type: web
    name: sfs-socialpowerhouse
    runtime: node
    buildCommand: npm install && npm run db:push
    startCommand: tsx server/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: socialpowerhouse-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

databases:
  - name: socialpowerhouse-db
    databaseName: socialpowerhouse
    plan: free
